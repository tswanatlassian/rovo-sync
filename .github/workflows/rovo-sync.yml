name: Rovo Sync - Automated Confluence ↔ Jira Sync

on:
  # Hourly polling
  schedule:
    - cron: '0 * * * *'  # Every hour at minute 0
  
  # Manual trigger
  workflow_dispatch:
  
  # Can also trigger on push (for testing)
  push:
    branches:
      - main
    paths:
      - 'rovo_sync_orchestrator.py'
      - '*_implementation.py'

jobs:
  sync:
    name: Sync Planning Pages
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests dataclasses-json
      
      - name: Run Rovo Sync
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          CONFLUENCE_URL: ${{ secrets.CONFLUENCE_URL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          CONFLUENCE_TOKEN: ${{ secrets.CONFLUENCE_TOKEN }}
          PLANNING_PAGES: ${{ secrets.PLANNING_PAGES }}
          LOG_LEVEL: INFO
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          python rovo_sync_orchestrator.py
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: sync-logs
          path: rovo_sync.log
          retention-days: 7
      
      - name: Commit updated memory files
        if: success()
        run: |
          git config --local user.email "rovo-sync@github-actions"
          git config --local user.name "Rovo Sync Bot"
          git add tacs_decisions.json tacs_learning.json || true
          git commit -m "Update: Sync cycle at $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push || echo "Nothing to push"
