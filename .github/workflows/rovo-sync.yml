name: Rovo Sync - Automated Confluence ↔ Jira Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'rovo_sync_orchestrator.py'
      - '*_implementation.py'

jobs:
  sync:
    name: Sync Planning Pages
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -q requests
      
      - name: Run Rovo Sync
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          CONFLUENCE_URL: ${{ secrets.CONFLUENCE_URL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          CONFLUENCE_TOKEN: ${{ secrets.CONFLUENCE_TOKEN }}
          PLANNING_PAGES: ${{ secrets.PLANNING_PAGES }}
          LOG_LEVEL: INFO
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: python rovo_sync_orchestrator.py
      
      - name: Save logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-logs
          path: rovo_sync.log
          retention-days: 7
